{% extends "base.html" %}
{% block title %}New Shipment{% endblock %}
{% block body %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <div>
    <h2 class="fw-bold mb-1">Create Shipment</h2>
    <div class="text-muted">Create an additional shipment for PO <b>{{ po.po_number }}</b>.</div>
  </div>
  <a class="btn btn-outline-secondary" href="/po/{{ po.id }}/">Back to PO</a>
</div>

<div class="card card-soft p-4">
  <form method="post">{% csrf_token %}
    <div class="row g-3">
      <div class="col-md-6">
        <label class="form-label">Destination</label>
        <select class="form-select" name="destination_id" required>
          {% for d in dests %}
            <option value="{{ d.id }}">{{ d.name }} ({{ d.type }})</option>
          {% endfor %}
        </select>
      </div>
      <div class="col-md-6">
        <label class="form-label">ETA</label>
        <input type="date" class="form-control" name="eta">
      </div>
      <div class="col-md-6">
        <label class="form-label">Carrier</label>
        <input class="form-control" name="carrier" placeholder="DHL / Maersk / etc">
      </div>
      <div class="col-md-6">
        <label class="form-label">Tracking Number</label>
        <input class="form-control" name="tracking_number">
      </div>
    </div>
    <div class="mt-4">
      <button class="btn btn-primary" type="submit">Create Shipment</button>
    </div>
  </form>
</div>
{% endblock %}
